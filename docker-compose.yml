version: '3.8'

networks:
  api_net:
    driver: bridge
  db_net:
    driver: bridge

services:
  # Mock Server (Prism) - Para desarrollo frontend
  mock:
    image: stoplight/prism:4
    volumes:
      - ./specs:/specs:ro
    ports:
      - "4010:4000"
    command: mock /specs/openapi.yaml --host 0.0.0.0 --port 4000 --dynamic
    environment:
      - LOG_LEVEL=info
    networks:
      - api_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--timeout=2", "-q", "-O", "/dev/null", "http://127.0.0.1:4000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Backend (FastAPI)
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - ./specs:/specs:ro
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://chatbot:${POSTGRES_PASSWORD:-chatbot}@postgres:5432/chatbot
      - DATABRICKS_HOST=${DATABRICKS_HOST}
      - DATABRICKS_TOKEN=${DATABRICKS_TOKEN}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    networks:
      - api_net
      - db_net
    depends_on:
      - mock
      - postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_DB: chatbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - db_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # pgAdmin (panel de administración web)
  pgadmin:
    image: dpage/pgadmin4:latest
    env_file:
      - .env.docker
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@chatbot-sdd.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    networks:
      - db_net
    depends_on:
      - postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M

  # Frontend (React + Vite)
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:4010
      - VITE_MOCK_ENABLED=true
    depends_on:
      - mock
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  pgdata:
