version: '3.8'

services:
  # Mock Server (Prism) - Para desarrollo frontend
  mock:
    image: stoplight/prism:4
    volumes:
      - ./specs:/specs:ro
    ports:
      - "4010:4000"
    command: mock /specs/openapi.yaml --host 0.0.0.0 --port 4000 --dynamic
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--timeout=2", "-q", "-O", "/dev/null", "http://127.0.0.1:4000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Backend (FastAPI)
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - ./specs:/specs:ro
    ports:
      - "8000:8000"
    environment:
      - DATABRICKS_HOST=${DATABRICKS_HOST}
      - DATABRICKS_TOKEN=${DATABRICKS_TOKEN}
      - PYTHONPATH=/app
      - ENVIRONMENT=development
    depends_on:
      - mock
    restart: unless-stopped

  # Frontend (React + Vite)
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:4010
      - VITE_MOCK_ENABLED=true
    depends_on:
      - mock
    restart: unless-stopped